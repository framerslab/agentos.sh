<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,follow">
  <title>Page Not Found — AgentOS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: hsl(220, 30%, 98%);
      --text: hsl(222, 47%, 8%);
      --muted: hsl(220, 15%, 45%);
      --accent: hsl(250, 95%, 55%);
      --border: hsl(220, 20%, 88%);
      --card-bg: rgba(255, 255, 255, 0.7);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: hsl(240, 20%, 3%);
        --text: hsl(220, 30%, 98%);
        --muted: hsl(220, 15%, 60%);
        --accent: hsl(250, 100%, 70%);
        --border: hsl(260, 20%, 18%);
        --card-bg: rgba(255, 255, 255, 0.04);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .container { max-width: 520px; }

    h1 {
      font-size: 5rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--accent), hsl(280, 100%, 65%));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    h2 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
    }

    p {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 2rem;
      max-width: 480px;
    }

    .actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9375rem;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn:hover { transform: translateY(-1px); }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 12px rgba(128, 90, 213, 0.3);
    }
    .btn-primary:hover { box-shadow: 0 6px 20px rgba(128, 90, 213, 0.4); }

    .btn-secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

    .redirecting {
      font-size: 0.8125rem;
      color: var(--muted);
      margin-top: 1.25rem;
      display: none;
    }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-radius: 50%;
      border-top-color: var(--accent);
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p id="message">The page you are looking for does not exist or has been moved.</p>
    <div class="actions" id="actions">
      <a href="/" class="btn btn-primary" id="home-link">Go Home</a>
      <a href="https://docs.agentos.sh" class="btn btn-secondary">View Docs</a>
      <a href="https://github.com/framerslab/agentos" class="btn btn-secondary">GitHub</a>
    </div>
    <div class="redirecting" id="redirect-notice">
      <span class="spinner"></span>
      <span id="redirect-text">Redirecting...</span>
    </div>
  </div>

  <script>
    (function () {
      var path = window.location.pathname;
      var locales = ['en', 'es', 'fr', 'de', 'pt', 'ja', 'ko', 'zh'];
      var segments = path.split('/').filter(Boolean);
      var first = segments[0];

      /*
       * Show the 404 directly. Do NOT redirect a bare path to a locale
       * prefix: existing pages are mirrored to the bare path at build time
       * (scripts/post-export.mjs), and Cloudflare 301s /en/<path> back to
       * /<path>. Redirecting a genuinely-missing page to /en/<path> just
       * bounces straight back here and loops forever.
       */
      if (first && locales.includes(first)) {
        /* Locale prefix present: point "Go Home" at that locale's home. */
        document.getElementById('home-link').href =
          first === 'en' ? '/' : '/' + first;
      }
    })();
  </script>
</body>
</html>
