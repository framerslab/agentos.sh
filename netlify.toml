# ============================================================================
# INACTIVE on production. agentos.sh is served by GitHub Pages behind
# Cloudflare — Netlify never sees these rules and none of them fire.
#
# Canonical redirect rules live in Cloudflare → Rules → Redirect Rules
# (https://dash.cloudflare.com → agentos.sh zone). See cloudflare-redirects.md
# in this directory for the rule list. This file is kept so that if the site
# ever moves back to Netlify the rules are recoverable, but do NOT add new
# redirect rules here expecting them to take effect.
# ============================================================================

# Renamed-slug redirects (blog post URLs that changed)
[[redirects]]
  from = "/blog/paracosm-2026-overview"
  to = "/en/blog/paracosm-launch/"
  status = 301
  force = true

[[redirects]]
  from = "/blog/paracosm-2026-overview/"
  to = "/en/blog/paracosm-launch/"
  status = 301
  force = true

[[redirects]]
  from = "/en/blog/paracosm-2026-overview"
  to = "/en/blog/paracosm-launch/"
  status = 301
  force = true

[[redirects]]
  from = "/en/blog/paracosm-2026-overview/"
  to = "/en/blog/paracosm-launch/"
  status = 301
  force = true

# Redirects for non-locale paths to default English locale
[[redirects]]
  from = "/docs"
  to = "/en/docs/"
  status = 301

[[redirects]]
  from = "/docs/*"
  to = "/en/docs/:splat"
  status = 301

[[redirects]]
  from = "/about"
  to = "/en/about/"
  status = 301

[[redirects]]
  from = "/faq"
  to = "/en/faq/"
  status = 301

[[redirects]]
  from = "/blog"
  to = "/en/blog/"
  status = 301

[[redirects]]
  from = "/blog/*"
  to = "/en/blog/:splat"
  status = 301

[[redirects]]
  from = "/careers"
  to = "/en/careers/"
  status = 301

[[redirects]]
  from = "/careers/*"
  to = "/en/careers/:splat"
  status = 301

[[redirects]]
  from = "/legal"
  to = "/en/legal/"
  status = 301

[[redirects]]
  from = "/legal/*"
  to = "/en/legal/:splat"
  status = 301

[[redirects]]
  from = "/terms"
  to = "/en/legal/terms/"
  status = 301

[[redirects]]
  from = "/privacy"
  to = "/en/legal/privacy/"
  status = 301

# Root RSC payload rewrite (prevents 404 on prefetch)
[[redirects]]
  from = "/index.txt"
  to = "/en/index.txt"
  status = 200
  force = true

# Root path to English homepage
[[redirects]]
  from = "/"
  to = "/en/"
  status = 301

# HTML pages — always revalidate
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Hashed Next.js static assets — immutable long cache
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Static assets (fonts, images, etc.)
[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security and general headers
[[headers]]
  for = "/*"
  [headers.values]
    X-DNS-Prefetch-Control = "on"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Cross-Origin-Opener-Policy = "same-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://static.cloudflareinsights.com https://api.github.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://api.github.com https://api.npmjs.org https://www.google-analytics.com; frame-src 'self' https://www.youtube-nocookie.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self';"
# Proxy TypeDoc API docs from GitHub Pages
[[redirects]]
  from = "/docs-generated/library/*"
  to = "https://framerslab.github.io/agentos/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/docs-generated/api/*"
  to = "https://framerslab.github.io/agentos/api/:splat"
  status = 200
  force = true
