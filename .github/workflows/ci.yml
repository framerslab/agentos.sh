name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Detect package manager
        id: pm
        run: |
          if [ -f pnpm-lock.yaml ] || node -e "try{const s=Object.values(require('./package.json').scripts||{}).join(' '); process.exit(s.includes('pnpm')?0:1)}catch(e){process.exit(1)}"; then
            echo "pm=pnpm" >> $GITHUB_OUTPUT
          else
            echo "pm=npm" >> $GITHUB_OUTPUT
          fi
      - name: Setup pnpm
        if: steps.pm.outputs.pm == 'pnpm'
        uses: pnpm/action-setup@v6
        # version is read from package.json packageManager field (pnpm@10.15.1)
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          # This repo has no pnpm-lock.yaml. setup-node@v5 defaults
          # package-manager-cache to true, reads the packageManager field, and
          # then fails with "Dependencies lock file is not found". pnpm is
          # provisioned by the step above, so disable the built-in cache.
          package-manager-cache: false
      - name: Install
        run: |
          if [ "${{ steps.pm.outputs.pm }}" = "pnpm" ]; then
            pnpm install --no-frozen-lockfile
          elif [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
      - name: Lint
        run: |
          if [ "${{ steps.pm.outputs.pm }}" = "pnpm" ]; then
            pnpm run lint || echo "No lint script; skipping"
          else
            npm run lint --if-present
          fi
      - name: Test
        run: |
          if [ "${{ steps.pm.outputs.pm }}" = "pnpm" ]; then
            pnpm run test || echo "No test script; skipping"
          else
            npm test --if-present
          fi
      - name: Coverage (Vitest, 60% lines minimum)
        run: |
          if [ -f vitest.config.ts ] || [ -f vitest.config.js ]; then
            if [ "${{ steps.pm.outputs.pm }}" = "pnpm" ]; then
              pnpm exec vitest run --coverage
            else
              npx vitest run --coverage
            fi
          else
            echo "No vitest config found; skipping coverage check."
          fi


